name: Build and run end-to-end tests
# Builds the project, and runs end-to-end tests using the generated artifacts.

concurrency:
  group: end-to-end-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - docs/**
      - "*.md"
      - "gui/packages/ubuntupro/lib/l10n/app_*.arb"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-wsl-pro-service:
    name: Build wsl-pro-service debian package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Build debian package
        uses: canonical/desktop-engineering/gh-actions/common/build-debian@main
        with:
          source-dir: wsl-pro-service
          token: ${{ secrets.GITHUB_TOKEN }}
          docker-image: ubuntu:devel
        env:
          UP4W_SKIP_INTERNAL_DEPENDENCY_UPDATE: "1"

  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      numeric-version: ${{ steps.version.outputs.numeric_version }}
      full-version: ${{ steps.version.outputs.full_version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: go.work
      - name: Compute version
        id: version
        run: |
          versionInfo=$(go run ./tools/build/compute_version.go --json)
          echo "numeric_version=$(jq -r '.numeric_version' <<< "$versionInfo").0" >> "$GITHUB_OUTPUT"
          echo "full_version=$(jq -r '.full_version' <<< "$versionInfo")"         >> "$GITHUB_OUTPUT"
          echo "tag=$(jq -r '.tag' <<< "$versionInfo")"         >> "$GITHUB_OUTPUT"

  build-ubuntu-pro-for-wsl:
    needs: version
    strategy:
      matrix:
        mode: ["production", "end_to_end_tests"]
    name: Build Windows Agent MSIX (${{ matrix.mode }})
    runs-on: windows-latest
    steps:
      - name: Check out repository for internal GH action
        uses: actions/checkout@v7
        with:
          fetch-tags: true
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache-dependency-path: go.work
      - name: Read flutter version
        id: flutter-version
        uses: ./.github/actions/read-file
        with:
          path: tools/flutter-version
      - uses: CarlosNihelton/flutter-action@53984264025d6f0cda85838542ad2d440351ceb7
        with:
          cache: true
          channel: stable
          flutter-version: ${{ steps.flutter-version.outputs.contents }}
          pub-cache: true
      - uses: microsoft/setup-WinAppCli@64bc6fd4c3e4c69e2de589dfc34684470891b8b7 # v0.1
      - name: Build components
        shell: powershell
        run: |
          $config = if ('${{ matrix.mode }}' -eq 'production') { 'Release' } else { 'Debug' }
          $compileArgs = @{
            Config = $config
            Platform = 'x64'
            Mode = '${{ matrix.mode }}'
            Version = '${{ needs.version.outputs.numeric-version }}'
            FullVersion = '${{ needs.version.outputs.full-version }}'
            Tag = '${{ needs.version.outputs.tag }}'
          }

          .\build.ps1 Compile @compileArgs
          if ($LASTEXITCODE -ne 0) { throw "build.ps1 Compile failed" }

      - name: Pack MSIX Bundle
        # The Pack action with a password protected PFX certificate requires PowerShell 7.
        shell: pwsh
        run: |
          New-Item -ItemType directory -Path certificate -Force
          Set-Content -Path certificate\certificate.txt -Value '${{ secrets.CERTIFICATE }}'
          certutil -decode certificate\certificate.txt certificate\certificate.pfx
          $certPass = ConvertTo-SecureString '${{ secrets.CERTIFICATE_PASSWORD }}' -AsPlainText -Force

          # Single input folder only outputs .msix file, never .msixbundle.
          $msixVersion="${{ needs.version.outputs.numeric-version }}"
          .\build.ps1 Pack -InputFolders "$PWD/dist/x64" -Manifest "$PWD/dist/Package.appxmanifest" -Cert "$PWD/certificate/certificate.pfx" -CertPass $certPass

      - name: Upload end-to-end bundle
        uses: actions/upload-artifact@v7
        with:
          name: UbuntuProForWSL-${{ matrix.mode }}-${{ github.sha }}
          path: |
            *.msix
            *.cer

  qa:
    name: Run end-to-end tests
    runs-on: [windows-latest]
    needs: [build-wsl-pro-service, build-ubuntu-pro-for-wsl]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      # GH runners come with WSL stable pre-installed.
      - name: Sanity check WSL version
        run: |
          wsl --version
      - uses: actions/setup-go@v6
        with:
          cache-dependency-path: go.work
          go-version-file: go.work
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
        # name: is left blank so that all artifacts are downloaded
          path: ci-artifacts
      - name: Download WSL image
        uses: ./.github/actions/get-wsl-image
        id: get-wsl-image
        with:
          base_url: "https://cdimages.ubuntu.com/ubuntu-wsl/stonking/daily-live/current" # The latest devel
          arch: "amd64"
          output_path: "ci-artifacts/images/ubuntu.wsl"
      - name: Lay out the downloaded artifacts
        shell: powershell
        working-directory: ci-artifacts
        run: |
          Write-Output "::group::Lay out the MSIX Package"
          New-Item -Name "windows-agent" -ItemType Directory

          # Use the pre-built e2e msix and cer
          $bundleDir = Get-ChildItem -Path "UbuntuProForWSL-end_to_end_tests-*" -Directory | Select-Object -First 1
          if (-not $bundleDir) { throw "No e2e msix packages artifact found" }
          $msixFiles = Get-ChildItem -Path $bundleDir.FullName -Filter '*.msix'
          if (-not $msixFiles) { throw "No .msix found in end_to_end_tests artifact" }
          Copy-Item $msixFiles[0].FullName -Destination "windows-agent\" -Verbose
          $certFiles = Get-ChildItem -Path $bundleDir.FullName -Filter '*.cer'
          if ($certFiles) { Copy-Item $certFiles[0].FullName -Destination "windows-agent\" }
          Remove-Item -Recurse $bundleDir.FullName

          $cert = "$(Get-ChildItem windows-agent/*.cer -ErrorAction SilentlyContinue)"
          if ($cert) { Import-Certificate -FilePath "${cert}" -CertStoreLocation Cert:LocalMachine\TrustedPeople }

          Write-Output "::endgroup::"

          Write-Output "::group::Lay out WSL Pro Service"
          New-Item -Name "wsl-pro-service" -ItemType Directory
          Move-Item -Path "wsl-pro-service_*/wsl-pro-service_*.deb" -Destination "wsl-pro-service/"
          Remove-Item -Recurse "wsl-pro-service_*/"
          Write-Output "::endgroup::"

          Write-Output "::group::Prepare the golden image"
          wsl.exe --install --name Reference --from-file ./images/ubuntu.wsl --no-launch
          wsl.exe -d Reference -u root -- apt-get update 
          wsl.exe -d Reference -u root -- bash -ec 'apt-get install -y "$(wslpath -ua ./wsl-pro-service/*.deb )"'
          wsl.exe -d Reference -u root -- bash -ec 'echo verbosity: 3 > /etc/wsl-pro-service.yaml'
          wsl.exe -d Reference -u root -- adduser --disabled-password --quiet --gecos Ubuntu ubuntu
          wsl.exe -d Reference -u root -- usermod ubuntu -aG sudo,adm
          wsl.exe -d Reference -u root -- bash -ec 'cloud-init clean --logs || true'
          wsl.exe -d Reference -u root -- bash -ec 'rm /etc/cloud/cloud-init.disabled || true'
          wsl.exe --shutdown
          wsl.exe --export Reference ./images/ubuntu-preview.tar.gz
          wsl.exe --unregister Reference
          $sha256 = (Get-FileHash -Path "./images/ubuntu-preview.tar.gz" -Algorithm SHA256 ).Hash
          Write-Output "::endgroup::"

          Write-Output "::group::Lay out the manifest override"
          $manifest= @{
              ModernDistributions=@{
                  Ubuntu = @(
                      @{
                          Name = "Ubuntu"
                          Default = $true
                          FriendlyName = "Ubuntu base test image"
                          Amd64Url = @{
                              Url = "file:///$PWD/images/ubuntu.wsl"
                              Sha256 = "0x${{ steps.get-wsl-image.outputs.cache-key }}"
                          }
                      },
                      @{
                          Name = "Ubuntu-Preview"
                          Default = $true
                          FriendlyName = "Ubuntu golden test image"
                          Amd64Url = @{
                              Url = "file:///$PWD/images/ubuntu-preview.tar.gz"
                              Sha256 = "0x$sha256"
                          }
                      })
                  }
              }

          $manifestFile = "$PWD/images/test_manifest.json"
          $manifest | ConvertTo-Json -Depth 5 | Out-File -encoding ascii  $manifestFile
          Set-ItemProperty -Path "HKLM:SOFTWARE\Microsoft\Windows\CurrentVersion\Lxss" -Name DistributionListUrlAppend -Value "file://$manifestFile" -Type String -Force
          Write-Output "::endgroup::"

      # Installing a debug version of VCLibs from the SDK is required, otherwise installing the Ubuntu pro debug appx will fail.
      - name: Install Debug version of VCLibs
        shell: powershell
        run: Add-AppxPackage "C:\Program Files (x86)\Microsoft SDKs\Windows Kits\10\ExtensionSDKs\Microsoft.VCLibs.Desktop\14.0\Appx\Debug\x64\Microsoft.VCLibs.x64.Debug.14.00.Desktop.appx"
      - name: Test
        shell: powershell
        env:
          GIT_TERMINAL_PROMPT: "0"
          UP4W_TEST_OVERRIDE_DESTRUCTIVE_CHECKS: "1"
          UP4W_TEST_BUILD_PATH: "../ci-artifacts"
          UP4W_TEST_PRO_TOKEN: "${{ secrets.UBUNTU_PRO_TOKEN }}"
        run: |
          go test -v .\end-to-end -shuffle=on -timeout 20m
          if ( "$LastExitCode" -ne "0" ) { Exit(1) }

      - name: Clean up
        if: always()
        shell: powershell
        run: |
          # Clean up artifacts

          # Remove .gitconfig so that the github URL overrides do not stack
          Remove-Item -Recurse -Path "${HOME}\.gitconfig" -ErrorAction Ignore

          # Uninstall the MSIX
          Get-AppxPackage -Name "CanonicalGroupLimited.UbuntuPro" | Remove-AppxPackage -ErrorAction Ignore

          # Uninstall the certificate
          $thumbprint = (Get-PfxCertificate -FilePath "ci-artifacts\windows-agent\*.cer" -ErrorAction SilentlyContinue).Thumbprint
          if ($thumbprint) { Remove-Item -Path "Cert:LocalMachine\TrustedPeople\${thumbprint}" -ErrorAction SilentlyContinue }

          # Remove the WSL Manifest override from the Registry.
          Remove-ItemProperty -Path "HKLM:SOFTWARE\Microsoft\Windows\CurrentVersion\Lxss" -Name DistributionListUrlAppend -ErrorAction SilentlyContinue
